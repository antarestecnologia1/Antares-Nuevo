# Postgres local para desarrollo y verificación automática (npm run verify:stack).
services:
  postgres:
    image: postgres:15-alpine
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: antares
      POSTGRES_PASSWORD: antares_dev_local
      POSTGRES_DB: antares
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U antares -d antares"]
      interval: 2s
      timeout: 5s
      retries: 30
